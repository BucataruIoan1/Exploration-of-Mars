<div class="choose-page" [formGroup]="doctorForm">
  <div class="choose-panel">
    <h1 class="choose-title">Please introduce a name for the doctor</h1>
    <div class="choose-emoji">🧑‍⚕️</div>

    <input
      #nameInput
      class="choose-input"
      type="text"
      formControlName="doctorName"
      placeholder="Enter Doctor name..."
    />

    <button type="button" class="choose-button" [disabled]="!canProceed" (click)="moveToEngineerStep()">
      Next →
    </button>

    <div class="progress-dots" aria-label="Progress">
      <span class="dot dot-active"></span>
      <span class="dot dot-active"></span>
      <span class="dot"></span>
    </div>
  </div>
</div>
