<div class="choose-page" [formGroup]="engineerForm">
  <div class="choose-panel">
    <h1 class="choose-title">Please introduce a name for the engineer</h1>
    <div class="choose-emoji">👷</div>

    <input
      #nameInput
      class="choose-input"
      type="text"
      formControlName="engineerName"
      placeholder="Enter Engineer name..."
    />

    <button
      type="button"
      class="choose-button choose-button-primary"
      [disabled]="!canProceed"
      (click)="moveToGame()"
    >
      Start Mission! 🚀
    </button>

    <div class="progress-dots" aria-label="Progress">
      <span class="dot dot-active"></span>
      <span class="dot dot-active"></span>
      <span class="dot dot-active"></span>
    </div>
  </div>
</div>
