<div class="choose-page" [formGroup]="explorerForm">
  <div class="choose-panel">
    <h1 class="choose-title">Please introduce a name for the explorer</h1>
    <div class="choose-emoji">👨‍🚀</div>

    <input
      #nameInput
      class="choose-input"
      type="text"
      formControlName="explorerName"
      placeholder="Enter Explorer name..."
    />

    <button type="button" class="choose-button" [disabled]="!canProceed" (click)="moveToDoctorStep()">
      Next →
    </button>

    <div class="progress-dots" aria-label="Progress">
      <span class="dot dot-active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</div>
