<div class="game-page">
  <div class="game-layout">
    <aside class="hud">
      <div class="hud-panel">
        <div
          class="hero-card"
          *ngFor="let character of characters"
          [class.hero-dead]="isCharacterDead(character)"
          [class.hero-current]="currentPlayer === character?.type && !isColonyDiscovered && getHpValue(character) > 0"
        >
          <div class="hero-top">
            <div class="hero-left">
              <span class="hero-avatar">{{ character?.avatar }}</span>
              <span class="hero-role">{{ character?.type | titlecase }}</span>
              <span class="hero-down" *ngIf="isCharacterDead(character)">☠ DOWN</span>
            </div>
            <div class="turn-pill" *ngIf="currentPlayer === character?.type && !isColonyDiscovered && getHpValue(character) > 0">Turn</div>
          </div>

          <div class="hero-name-row">NAME: {{ character?.name }}</div>

          <div class="stat-row">
            <div class="stat-label">HP</div>
            <div class="stat-bar">
              <div class="stat-fill stat-hp" [style.width.%]="clampPercent(getHpValue(character))"></div>
            </div>
            <div class="stat-value">{{ getHpValue(character) }}/100</div>
          </div>

          <div class="stat-row">
            <div class="stat-label">Armour</div>
            <div class="stat-bar">
              <div class="stat-fill stat-armour" [style.width.%]="clampPercent(getArmourValue(character))"></div>
            </div>
            <div class="stat-value">{{ getArmourValue(character) }}/100</div>
          </div>

          <div class="hero-targets" *ngIf="character?.type === 'doctor' && selectedOption === 'Heal' && currentPlayer === 'doctor'">
            <div class="target-title">Select target:</div>
            <div class="target-list">
              <span *ngIf="doctor && explorer && areCharactersOnSamePosition(doctor, explorer)">
                <div class="checkbox-wrapper-13 target-item">
                  <input id="heal-explorer" type="checkbox" [(ngModel)]="explorerHealCheckbox" (change)="onExplorerCheckboxChange()" />
                  <label for="heal-explorer">Heal Explorer</label>
                </div>
              </span>
              <span *ngIf="doctor && engineer && areCharactersOnSamePosition(doctor, engineer)">
                <div class="checkbox-wrapper-13 target-item">
                  <input id="heal-engineer" type="checkbox" [(ngModel)]="engineerHealCheckbox" (change)="onEngineerCheckboxChange()" />
                  <label for="heal-engineer">Heal Engineer</label>
                </div>
              </span>
            </div>
          </div>

          <div class="hero-targets" *ngIf="character?.type === 'engineer' && selectedOption === 'Repair' && currentPlayer === 'engineer'">
            <div class="target-title">Select target:</div>
            <div class="target-list">
              <span *ngIf="engineer && explorer && areCharactersOnSamePosition(engineer, explorer)">
                <div class="checkbox-wrapper-13 target-item">
                  <input id="repair-explorer" type="checkbox" [(ngModel)]="explorerRepairCheckbox" (change)="onExplorerCheckboxChangeRepair()" />
                  <label for="repair-explorer">Repair Explorer</label>
                </div>
              </span>
              <span *ngIf="engineer && doctor && areCharactersOnSamePosition(engineer, doctor)">
                <div class="checkbox-wrapper-13 target-item">
                  <input id="repair-doctor" type="checkbox" [(ngModel)]="doctorRepairCheckbox" (change)="onDoctorCheckboxChange()" />
                  <label for="repair-doctor">Repair Doctor</label>
                </div>
              </span>
            </div>
          </div>
        </div>

        <div
          class="event-message"
          *ngIf="eventMessage as msg"
          [class.event-message-win]="msg.variant === 'win'"
          [class.event-message-danger]="msg.variant === 'danger'"
        >
          {{ msg.text }}
        </div>

        <div class="actions-panel">
          <div class="action-buttons" *ngIf="atLeastOneCharacterAlive()">
            <button
              type="button"
              class="action-btn"
              *ngFor="let option of getAvailableOptions()"
              (click)="onOptionSelect(option)"
              [disabled]="isOptionSelected && option !== selectedOption"
              [class.is-selected]="isOptionSelected && option === selectedOption"
            >
              <span class="action-icon">
                <ng-container [ngSwitch]="option">
                  <span *ngSwitchCase="'Explore'">🧭</span>
                  <span *ngSwitchCase="'Stay'">⏸️</span>
                  <span *ngSwitchCase="'Heal'">💊</span>
                  <span *ngSwitchCase="'Repair'">🔧</span>
                </ng-container>
              </span>
              <span>{{ option }}</span>
            </button>
          </div>

          <div class="inline-error" *ngIf="showErrorMessage && atLeastOneCharacterAlive()">
            {{ getErrorMessage() }}
          </div>

          <button
            type="button"
            class="restart-btn"
            [disabled]="!(isColonyDiscovered || !atLeastOneCharacterAlive())"
            (click)="restartGame()"
          >
            Restart Game
          </button>
        </div>
      </div>
    </aside>

    <main class="board-area">
      <div class="board-panel">
        <div class="board-grid" [class.explore-mode]="isExploreMode()">
          <ng-container *ngFor="let row of board; let i = index">
            <ng-container *ngFor="let box of row; let j = index">
              <div
                class="grid-cell"
                [ngClass]="{
                  'grid-cell-explored': box === BoardBox.Explored,
                  'grid-cell-unexplored': box !== BoardBox.Explored,
                  'grid-cell-active': isCellActive(i, j),
                  'colony-discovered-box': isColonyDiscovered && i === winning.row && j === winning.col,
                  'mars-cliffs-box': i === cliff.row && j === cliff.col && box === BoardBox.Explored,
                  'mars-storm-box':
                    ((i === storms.row1 && j === storms.col1) ||
                      (i === storms.row2 && j === storms.col2) ||
                      (i === storms.row3 && j === storms.col3)) &&
                    box === BoardBox.Explored,
                  'mars-radiation-box':
                    ((i === radiations.row1 && j === radiations.col1) ||
                      (i === radiations.row2 && j === radiations.col2)) &&
                    box === BoardBox.Explored,
                  'mars-aliens-box':
                    ((i === aliens.row1 && j === aliens.col1) || (i === aliens.row2 && j === aliens.col2)) &&
                    box === BoardBox.Explored,
                  'mars-boss-box': i === darthVader.row && j === darthVader.col && box === BoardBox.Explored
                }"
                (click)="onBoxClick(i, j)"
              >
                <div class="cell-inner">
                  <ng-container *ngIf="getHeroesAt(i, j) as heroes">
                    <div class="cell-heroes" *ngIf="heroes.length > 0">
                      <span class="cell-hero" *ngFor="let h of heroes">{{ h.avatar }}</span>
                    </div>

                    <span class="cell-unknown" *ngIf="heroes.length === 0 && box !== BoardBox.Explored">?</span>
                    <span
                      class="cell-emoji"
                      *ngIf="getCellEmoji(i, j) as emoji"
                      [class.cell-emoji-under]="heroes.length > 0"
                    >
                      {{ emoji }}
                    </span>
                  </ng-container>
                </div>
              </div>
            </ng-container>
          </ng-container>
        </div>
      </div>
    </main>
  </div>
</div>
