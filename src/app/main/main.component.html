<div *ngIf="!isGameStarted" class="main-page">
  <div class="hero">
    <div class="hero-content">
      <div class="mars-panel">
        <div class="mars-panel-image" role="img" aria-label="Mars Colony"></div>
      </div>

      <h1 class="hero-title mars-glow-text">
        Mars Colony
        <br />
        <span class="hero-subtitle">Discovery</span>
      </h1>

      <p class="hero-description">
        Lead a team of 3 heroes across the Martian surface. Explore the unknown.
        Find the colony. Survive the dangers.
      </p>

      <button type="button" class="start-button" (click)="startGame()">
        🚀 Start Game
      </button>
    </div>
  </div>
</div>
